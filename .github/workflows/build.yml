name: MSBuild

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'

env:
  SOLUTION_FILE_PATH: CP_Main_10.sln

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      version_filename: ${{ steps.set.outputs.version_filename }}
      version_dot: ${{ steps.set.outputs.version_dot }}
    steps:
      - name: Generate build number
        id: bn
        uses: onyxmueller/build-tag-number@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compose version strings
        id: set
        run: |
          echo "version_filename=3_25_${BUILD_NUMBER}_0" >> $GITHUB_OUTPUT
          echo "version_dot=3.25.${BUILD_NUMBER}.0" >> $GITHUB_OUTPUT

  build:
    needs: prep
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            output_dir: Release64
            iss: DittoSetup\DittoSetup_10.iss
            installer_basename: DittoSetup_
          - platform: ARM64
            output_dir: ReleaseARM64
            iss: DittoSetup\DittoSetup_arm64.iss
            installer_basename: DittoSetup_arm64_
    env:
      VCPKG_ROOT: C:\vcpkg
      VERSION_FILENAME: ${{ needs.prep.outputs.version_filename }}
      VERSION_DOT_FILENAME: ${{ needs.prep.outputs.version_dot }}
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build ${{ matrix.platform }}
        run: msbuild ${{ env.SOLUTION_FILE_PATH }} /p:Configuration=Release /p:Platform=${{ matrix.platform }} /m

      - name: Set Versions
        run: DittoSetup\rcedit-x64 ${{ matrix.output_dir }}\Ditto.exe --set-file-version ${{ env.VERSION_DOT_FILENAME }} --set-product-version ${{ env.VERSION_DOT_FILENAME }}

      - name: upload-unsigned-exe
        id: upload-unsigned-exe
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-exe-${{ matrix.platform }}
          retention-days: 1
          path: |
            ${{ matrix.output_dir }}\Ditto.exe
            ${{ matrix.output_dir }}\ICU_Loader.dll
            ${{ matrix.output_dir }}\Addins\DittoUtil.dll

      - id: sign-exe
        uses: signpath/github-action-submit-signing-request@v1.1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: 'fcf33ea4-4343-46b3-be50-f8fe64e1a900'
          project-slug: 'Ditto'
          artifact-configuration-slug: 'exe'
          signing-policy-slug: 'release-signing'
          github-artifact-id: '${{ steps.upload-unsigned-exe.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: '${{ matrix.output_dir }}'

      - name: Download VC Redist for ARM64
        if: matrix.platform == 'ARM64'
        run: Invoke-WebRequest -Uri 'https://aka.ms/vs/17/release/vc_redist.arm64.exe' -OutFile 'DittoSetup\vc_redist.arm64.exe'

      - name: Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: ${{ matrix.iss }}

      - name: upload-unsigned-installer
        id: upload-unsigned-installer
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer-${{ matrix.platform }}
          retention-days: 1
          path: DittoSetup\output\${{ matrix.installer_basename }}${{ env.VERSION_FILENAME }}.exe

      - id: sign-installer
        uses: signpath/github-action-submit-signing-request@v1.1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: 'fcf33ea4-4343-46b3-be50-f8fe64e1a900'
          project-slug: 'Ditto'
          artifact-configuration-slug: 'Installer'
          signing-policy-slug: 'release-signing'
          github-artifact-id: '${{ steps.upload-unsigned-installer.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'DittoSetup\output'

      - name: Build Portable (x64 only)
        if: matrix.platform == 'x64'
        run: DittoSetup\BuildPortableZIP.bat "DittoPortable_${{ env.VERSION_FILENAME }}" bit64

      - name: Zip Debug Files
        run: |
            7z a DittoSetup\output\DittoDebug_${{ matrix.platform }}_${{ env.VERSION_FILENAME }}.7z *.pdb -r
            7z a DittoSetup\output\DittoDebug_${{ matrix.platform }}_${{ env.VERSION_FILENAME }}.7z *.map -r

      - name: Choco - Ditto
        if: matrix.platform == 'x64'
        continue-on-error: true
        run: |
            (Get-Content 'DittoSetup\Chocolatey\ditto.nuspec' -Raw).Replace("%version%", "${{ env.VERSION_DOT_FILENAME }}") | Out-File 'DittoSetup\Chocolatey\ditto.nuspec'
            copy DittoSetup\Output\DittoSetup_${{ env.VERSION_FILENAME }}.exe DittoSetup\Chocolatey\tools\DittoSetup_${{ env.VERSION_FILENAME }}.exe
            cd DittoSetup\Chocolatey
            choco pack
            choco push --source https://push.chocolatey.org/ --key ${{ secrets.CHOCO_API_KEY }}

      - name: Choco - Ditto.Install
        if: matrix.platform == 'x64'
        continue-on-error: true
        run: |
            (Get-Content 'DittoSetup\Chocolatey.install\ditto.nuspec' -Raw).Replace("%version%", "${{ env.VERSION_DOT_FILENAME }}") | Out-File 'DittoSetup\Chocolatey.install\ditto.nuspec'
            copy DittoSetup\output\DittoSetup_${{ env.VERSION_FILENAME }}.exe DittoSetup\Chocolatey.install\tools\DittoSetup_${{ env.VERSION_FILENAME }}.exe
            cd DittoSetup\Chocolatey.install
            choco pack
            choco push --source https://push.chocolatey.org/ --key ${{ secrets.CHOCO_API_KEY }}

      - name: Choco - Ditto.Portable
        if: matrix.platform == 'x64'
        continue-on-error: true
        run: |
            (Get-Content 'DittoSetup\Chocolatey.portable\ditto.nuspec' -Raw).Replace("%version%", "${{ env.VERSION_DOT_FILENAME }}") | Out-File 'DittoSetup\Chocolatey.portable\ditto.nuspec'
            copy DittoSetup\output\DittoPortable_${{ env.VERSION_FILENAME }}.zip DittoSetup\Chocolatey.portable\tools\DittoPortable_${{ env.VERSION_FILENAME }}.zip
            cd DittoSetup\Chocolatey.portable
            choco pack
            choco push --source https://push.chocolatey.org/ --key ${{ secrets.CHOCO_API_KEY }}

      - name: Build appx
        if: matrix.platform == 'x64'
        continue-on-error: true
        run: |
            7z x DittoSetup\output\DittoPortable_${{ env.VERSION_FILENAME }}.zip -oDittoSetup\appx -r
            (Get-Content 'DittoSetup\appx\appxmanifest.xml' -Raw).Replace("%version%", "${{ env.VERSION_DOT_FILENAME }}") | Out-File 'DittoSetup\appx\appxmanifest.xml'
            cd DittoSetup\appx
            $env:Path += ";C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x86"
            makeappx.exe pack /f files.ini /p Ditto_${{ env.VERSION_FILENAME }}.appx
            signtool.exe sign -f my.pfx -fd SHA256 -v Ditto_${{ env.VERSION_FILENAME }}.appx
            cd ..
            cd ..
            copy DittoSetup\appx\Ditto_${{ env.VERSION_FILENAME }}.appx DittoSetup\Output\Ditto_${{ env.VERSION_FILENAME }}.appx

      - name: Stage release artifacts
        run: |
            New-Item -ItemType Directory -Force -Path release-staging | Out-Null
            Copy-Item "DittoSetup\output\${{ matrix.installer_basename }}${{ env.VERSION_FILENAME }}.exe" release-staging\
            Copy-Item "DittoSetup\output\DittoDebug_${{ matrix.platform }}_${{ env.VERSION_FILENAME }}.7z" release-staging\
            if ('${{ matrix.platform }}' -eq 'x64') {
              if (Test-Path "DittoSetup\output\DittoPortable_${{ env.VERSION_FILENAME }}.zip") { Copy-Item "DittoSetup\output\DittoPortable_${{ env.VERSION_FILENAME }}.zip" release-staging\ }
              if (Test-Path "DittoSetup\Output\Ditto_${{ env.VERSION_FILENAME }}.appx") { Copy-Item "DittoSetup\Output\Ditto_${{ env.VERSION_FILENAME }}.appx" release-staging\ }
            }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          retention-days: 5
          path: release-staging\

  release:
    needs: [prep, build]
    runs-on: windows-latest
    env:
      VERSION_FILENAME: ${{ needs.prep.outputs.version_filename }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: DittoSetup\output
          pattern: release-*
          merge-multiple: true

      - name: Publish to GitHub
        env:
          token: ${{ secrets.GITHUB_TOKEN }}
          uploadPath: DittoSetup\output\
          tag: ${{ needs.prep.outputs.version_filename }}
          previous_tag: 3.25.113.0
        run: |
            npm install ./DittoSetup/GitHubRelease
            node ./DittoSetup/GitHubRelease/index.js
